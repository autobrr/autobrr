---
name: Nexum
identifier: nexum
description: "Nexum is a FRENCH Private Torrent Tracker for MOVIES / TV"
language: fr-fr
privacy: private
protocol: torrent
urls:
  - https://nexum-core.com/
supports:
  - irc
  - rss

settings:
  - name: apikey
    type: secret
    required: true
    label: API Key
    help: Paramètres -> Clé API.

irc:
  network: Nexum
  server: irc.nexum-core.com
  port: 6697
  tls: true
  channels:
    - "#releases"
  announcers:
    - NexumRelay
  settings:
    - name: nick
      type: text
      required: true
      label: Nick
      help: Bot nick. Eg. username_bot

    - name: auth.account
      type: text
      required: true
      label: Auth Account
      help: Auth Account. Eg. username_bot

    - name: auth.password
      type: secret
      required: true
      label: Auth Password
      help: Auth password. Main user IRC key or bot IRC key

  parse:
    type: single
    lines:
      - tests:
        - line: 'NEW :: Films :: Cant.Hardly.Wait.1998.MULTi.1080p.BluRay.DDP5.1.x264-ZiT :: 7.05 Gio :: 1080p :: - :: https://nexum-core.com/torrents/4053'
          expect:
            announceType: "NEW"
            category: Films
            torrentName: Cant.Hardly.Wait.1998.MULTi.1080p.BluRay.DDP5.1.x264-ZiT
            torrentSize: '7.05 Gi'
            releaseTags: 1080p
            flags: "-"
            baseUrl: "https://nexum-core.com/"
            torrentId: "4053"
        - line: 'NEW :: Animés :: One.Piece.E021.MULTi.1080p.WEB.x264-AMB3R :: 607.78 Mio :: 1080p :: - :: https://nexum-core.com/torrents/4080'
          expect:
            announceType: "NEW"
            category: Animés
            torrentName: One.Piece.E021.MULTi.1080p.WEB.x264-AMB3R
            torrentSize: '607.78 Mi'
            releaseTags: 1080p
            flags: "-"
            baseUrl: "https://nexum-core.com/"
            torrentId: "4080"
        - line: 'NEW :: Séries TV :: The.Librarians.The.Next.Chapter.S01E01.MULTi.1080p.WEB.H265-TyHD :: 883.01 Mio :: 1080p :: - :: https://nexum-core.com/torrents/4153'
          expect:
            announceType: "NEW"
            category: Séries TV
            torrentName: The.Librarians.The.Next.Chapter.S01E01.MULTi.1080p.WEB.H265-TyHD
            torrentSize: '883.01 Mi'
            releaseTags: 1080p
            flags: "-"
            baseUrl: "https://nexum-core.com/"
            torrentId: "4153"
        pattern: '^(.+) :: (.*?) :: (.*?) :: ([\d.]+\s?[KMGTP]?i)o :: (.*?) :: (.*?) :: (https?\:\/\/.+\/)torrents\/(\d+)$'
        vars:
          - announceType
          - category
          - torrentName
          - torrentSize
          - releaseTags
          - flags
          - baseUrl
          - torrentId

    match:
      infourl: "/torrents/{{ .torrentId }}"
      torrenturl: "/torrents/{{ .torrentId }}/download?api_token={{ .apikey }}"
