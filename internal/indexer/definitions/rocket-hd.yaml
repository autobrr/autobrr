---
#id: rocket-hd
name: RocketHD
identifier: rocket-hd
description: RocketHD (RHD) is a GERMAN private torrent tracker for MOVIES / TV
language: de-DE
urls:
  - https://rocket-hd.cc/
privacy: private
protocol: torrent
supports:
  - irc
  - rss
# source: UNIT3D
settings:
  - name: rsskey
    type: secret
    required: true
    label: RSS key (RID)
    help: "Your profile > Settings > RSS Key"

irc:
  network: RocketNET
  server: irc.rocket-hd.cc
  port: 6697
  tls: true
  channels:
    - "#announce"
  announcers:
    - GLaDOS
  settings:
    - name: nick
      type: text
      required: true
      label: Nick
      help: Bot nick. Eg. user-bot

    - name: pass
      type: secret
      required: true
      label: Network password
      help: Your profile > Settings > IRC Key

  parse:
    type: single
    lines:
      - tests:
          - line: "TV|WEB-DL|1080p|Die Scharfschuetzen S01 German 1080p WEB-DL H.264-AIDA|RLS:Die.Scharfschuetzen.S01.German.1080p.WEB-DL.H.264-AIDA|S:67.15GiB|TMDB:12345|U:Anonym|O:INTERNAL|FL:0|DU:0 [https://rocket-hd.cc/torrents/99]"
            expect:
              category: TV
              releaseTags: WEB-DL
              resolution: 1080p
              torrentName: Die Scharfschuetzen S01 German 1080p WEB-DL H.264-AIDA
              releaseName: Die.Scharfschuetzen.S01.German.1080p.WEB-DL.H.264-AIDA
              torrentSize: 67.15GiB
              tmdb: "12345"
              uploader: Anonym
              origin: INTERNAL
              freeleechPercent: "0"
              doubleUp: "0"
              torrentId: "99"
          - line: "Movies|Encode|1080p|Ju On 2 2003 GERMAN DL 1080p BluRay x264-WATCHABLE|RLS:Ju.On.2.2003.GERMAN.DL.1080p.BluRay.x264-WATCHABLE|S:7.42GiB|TMDB:67890|U:fritz47|O:NORMAL|FL:50|DU:0 [https://rocket-hd.cc/torrents/100]"
            expect:
              category: Movies
              releaseTags: Encode
              resolution: 1080p
              torrentName: Ju On 2 2003 GERMAN DL 1080p BluRay x264-WATCHABLE
              releaseName: Ju.On.2.2003.GERMAN.DL.1080p.BluRay.x264-WATCHABLE
              torrentSize: 7.42GiB
              tmdb: "67890"
              uploader: fritz47
              origin: NORMAL
              freeleechPercent: "50"
              doubleUp: "0"
              torrentId: "100"
        pattern: '^([^|]+)\|([^|]+)\|([^|]*)\|([^|]+)\|RLS:([^|]+)\|S:([^|]+)\|TMDB:(\d+)\|U:([^|]+)\|O:([^|]+)\|FL:(\d+)\|DU:(\d+) \[.*?/torrents/(\d+)\]'
        vars:
          - category
          - releaseTags
          - resolution
          - torrentName
          - releaseName
          - torrentSize
          - tmdb
          - uploader
          - origin
          - freeleechPercent
          - doubleUp
          - torrentId

    match:
      infourl: "/torrents/{{ .torrentId }}"
      torrenturl: "/torrent/download/{{ .torrentId }}.{{ .rsskey }}"
